<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artemis II Mission Simulator</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; }
      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 1000;
        color: #aaa; font-family: 'Courier New', monospace;
        transition: opacity 0.5s;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      #loading h1 { font-size: 1.5em; color: #fff; margin-bottom: 20px; letter-spacing: 4px; }
      #loading-bar-bg {
        width: 300px; height: 4px; background: #222; border-radius: 2px;
      }
      #loading-bar {
        height: 100%; width: 0%; background: #4a9eff; border-radius: 2px;
        transition: width 0.2s;
      }
      #loading-text { margin-top: 10px; font-size: 0.8em; }
    </style>
  </head>
  <body>
    <div id="loading">
      <h1>ARTEMIS II</h1>
      <div id="loading-bar-bg"><div id="loading-bar"></div></div>
      <div id="loading-text">Loading textures...</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
